---
layout: page
title: Index 4
excerpt: "A simple and clean responsive Jekyll theme for words and photos."
search_omit: true
---
<link rel="stylesheet" href="https://linux-dersleri.github.io//css/bootstrap.min.css">

<div class="row mb-2">
{% for post in site.posts limit:10 %}
  <div class="col-md-6">
      <div class="no-gutters border rounded overflow-hidden flex-md-row mb-4 shadow-sm h-md-250 position-relative">
        <div class="col p-4 d-flex flex-column position-static">
          <strong class="d-inline-block mb-2 text-primary">{{ post.date | date: "%B %d, %Y" }}</strong>
          <h3 class="mb-0">{{ post.title }}</h3>
          <div class="mb-1 text-muted">Konu Etiketleri</div>
          <p class="card-text mb-auto text-b">{{ post.tags }}</p>
          <a href="{{ site.url }}{{ post.url }}" class=" stretched-link"></a>
			
        </div>
        
      </div>
    </div>
 
{% endfor %}
</div>
